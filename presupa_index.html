<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Champions TeamBuilder</title><link rel="stylesheet" href="src/styles/app.css"></head>
<body>
<div class="app-shell">
  <aside class="sidebar card">
    <div class="card-header">
      <h2>Teams</h2><span class="status-msg" id="team-status">Ready</span>
    </div>
    <div class="actions" style="display: flex; flex-direction: column; gap: 8px;">
      <div style="display: flex; gap: 8px; width: 100%;">
        <button id="btn-new" style="flex: 1;">Create New</button>
        <button id="btn-save" class="primary" style="flex: 1;">Save</button>
      </div>
      <div style="display: flex; gap: 8px; width: 100%;">
        <button id="btn-import" style="flex: 1; background:#2ecc71; color:white; border:none; padding:8px; border-radius:4px; cursor:pointer; font-weight:bold;">Import</button>
        <button id="btn-export" style="flex: 1; background:#3498db; color:white; border:none; padding:8px; border-radius:4px; cursor:pointer; font-weight:bold;">Export</button>
        <button id="btn-delete" class="danger" style="flex: 1;">Delete</button>
      </div>
      <input type="file" id="file-import" accept=".json" style="display:none;">
    </div>
    <select id="team-select" size="8" class="team-list"></select>
    <div class="card-header" style="margin-top:20px;">
      <h2>Team Slots</h2><span class="status-msg" id="current-team-name">No team</span>
    </div>
    <div id="slots-grid" class="slots-grid" style="display: flex; flex-direction: column; gap: 10px;"></div>
  </aside>

  <main class="main-panel card">
    <div class="editor-header">
      <h2>Pokémon Editor</h2><span id="editor-status" class="status-msg">Select a slot</span>
    </div>
    <div class="editor-layout">
      <div class="sprite-panel">
        <button id="mega-toggle" class="mega-toggle hidden">Mega Evolution</button>
        <div id="sprite-box" class="sprite-box">No Pokémon selected</div>
      </div>
      <div class="form-panel">
        <div class="row-2">
          <div class="field-group">
            <label>Pokémon</label>
            <input type="text" id="poke-search" placeholder="Search Pokémon..." oninput="filterPokeList(this.value)" style="margin-bottom:5px;">
            <div id="pokemon-list" class="picker-list"></div>
          </div>
          <div class="field-group">
            <label>Item</label>
            <div id="item-list" class="picker-list"></div>
            <p id="item-desc" class="hint"></p>
          </div>
        </div>
        <div class="row-2" style="margin-top:15px;">
          <div class="field-group">
            <label>Ability</label>
            <select id="ability-select"></select>
            <div id="ability-desc-card" style="margin-top:8px; padding:8px 12px; background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.1); border-radius:6px; font-size:11.5px; color:#ddd; font-style:italic; line-height:1.4; display:flex; align-items:center; gap:8px; min-height:36px;">
        <span style="font-size:14px; opacity:0.8;">💡</span>
        <span id="ability-desc-text">Select an ability to see its effect.</span>
    </div>
          </div>
          <div class="field-group">
            <label>Nature</label>
            <select id="nature-select"></select>
          </div>
        </div>
      </div>
    </div>
    <div class="moves-stats-layout">
      <div class="moves-section">
        <h3>Moves <span class="hint">(4 slots, 2 choices each)</span></h3>
        <div id="moves-grid" class="moves-grid"></div>
      </div>
      <div class="stats-section">
        <div class="card-header">
            <h3>Stats</h3>
            <span class="hint" id="sp-budget">SP: 0/66 (Max 32 per stat)</span>
        </div>
        <div id="stats-grid" class="stats-grid"></div>
      </div>
    </div>

    <div style="grid-column: 1 / -1; margin-top: 20px;">
        <h3>Defensive Profile <span class="hint">(Weaknesses, Resistances, Immunities)</span></h3>
        <div id="defensive-profile" class="stat-card" style="padding: 15px;">
            <!-- Will be populated by JS -->
        </div>
    </div>

  </main>
</div>
<div id="modal-backdrop" class="modal-backdrop hidden">
  <div class="modal card">
    <h3>Create New Team</h3>
    <input id="team-name-input" type="text" maxlength="40" placeholder="Team name" />
    <div class="modal-actions"><button id="modal-cancel">Cancel</button><button id="modal-confirm" class="primary">Confirm</button></div>
  </div>
</div>
<script src="src/renderer.js"></script>
</body></html>
